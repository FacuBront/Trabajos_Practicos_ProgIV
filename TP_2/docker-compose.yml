services:
  db:
    image: postgres:16
    container_name: tp2_postgres
    environment:
      POSTGRES_DB: gestor_productos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestor_productos"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tp2_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/gestor_productos
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pg_data:
